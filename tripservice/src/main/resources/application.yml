spring:
  application:
    name: trip-service

  datasource:
    url: ${JDBC_DATABASE_URL:${DATABASE_URL}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8082

eureka:
  instance:
    hostname: tripservice-app-180bcd8fc60e.herokuapp.com
    prefer-ip-address: false
    non-secure-port: 80
    non-secure-port-enabled: true
    secure-port-enabled: false
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: https://eurekaserver-app-dd87242b5252.herokuapp.com/eureka/

logging:
  level:
    org.hibernate.SQL: debug
    org.springframework: info
