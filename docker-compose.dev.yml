    ports:
      - ${TRANSACTION_SERVICE_DB_PORT}:5432
    networks:
      - bagbuddy-network

  # --- REVIEW SERVICE ---
  review-service:
    build:
      context: ./reviewservice
      dockerfile: Dockerfile
    container_name: review-service-dev
    env_file:
