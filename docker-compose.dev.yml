  # --- TRIP SERVICE ---
  trip-service:
    build:
      context: ./tripservice
      dockerfile: Dockerfile
    container_name: trip-service-dev
    env_file:
      - ./.env
    ports:
      - "8082:8082"
    depends_on:
      - eureka-server
      - tripservice-db
    networks:
      - bagbuddy-network

  tripservice-db:
    image: postgres:15-alpine
    container_name: trip-service-postgres
    environment:
      POSTGRES_DB: ${TRIP_SERVICE_DB}
      POSTGRES_USER: ${TRIP_SERVICE_USER}
      POSTGRES_PASSWORD: ${TRIP_SERVICE_PASSWORD}
    volumes:
      - trip_pgdata:/var/lib/postgresql/data
    ports:
      - ${TRIP_SERVICE_DB_PORT}:5432
    networks:
      - bagbuddy-network

  # --- TRANSACTION SERVICE ---
  transaction-service:
    build:
      context: ./transactionservice
      dockerfile: Dockerfile
    container_name: transaction-service-dev
    env_file:
      - ./.env
    ports:
      - "8083:8083"
    depends_on:
      - eureka-server
      - transactionservice-db
    networks:
