    ports:
      - "8084:8084"
    depends_on:
      - eureka-server
      - reviewservice-db
    networks:
      - bagbuddy-network

  reviewservice-db:
    image: postgres:15-alpine
    container_name: review-service-postgres
    environment:
      POSTGRES_DB: ${REVIEW_SERVICE_DB}
      POSTGRES_USER: ${REVIEW_SERVICE_USER}
      POSTGRES_PASSWORD: ${REVIEW_SERVICE_PASSWORD}
    volumes:
      - review_pgdata:/var/lib/postgresql/data
    ports:
      - ${REVIEW_SERVICE_DB_PORT}:5432
    networks:
      - bagbuddy-network

# --- VOLUMES & NETWORK ---
volumes:
  transaction_pgdata:
  keycloak_pgdata:
  review_pgdata:
  trip_pgdata:
  user_pgdata:

networks:
  bagbuddy-network:
    driver: bridge