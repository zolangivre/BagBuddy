services:
  # --- EUREKA SERVER ---
  eureka-server:
    build:
      context: ./eurekaserver
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - bagbuddy-network

  # --- API GATEWAY ---
  api-gateway:
    build:
      context: ./apigateway
      dockerfile: Dockerfile
    container_name: api-gateway-dev
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
    restart: always
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - bagbuddy-network

