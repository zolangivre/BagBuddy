  transactionservice-db:
    image: postgres:15-alpine
    container_name: transaction-service-postgres
    environment:
      POSTGRES_DB: ${TRANSACTION_SERVICE_DB}
      POSTGRES_USER: ${TRANSACTION_SERVICE_USER}
      POSTGRES_PASSWORD: ${TRANSACTION_SERVICE_PASSWORD}
    volumes:
