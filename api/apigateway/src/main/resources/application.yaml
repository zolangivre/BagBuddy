spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        - id: trip-service
          uri: lb://trip-service
          predicates:
            - Path=/trips/**

        - id: transaction-service
          uri: lb://transaction-service
          predicates:
            - Path=/transactions/**

        - id: review-service
          uri: lb://review-service
          predicates:
            - Path=/reviews/**

        - id: keycloak
          uri: http://localhost:8000/realms/bagbuddy
          predicates:
            - Path=/keycloak/**

        - id: stripe
          uri: lb://stripe-service
          predicates:
            - Path=/stripe/**

server:
  port: 8080

eureka:
  instance:
    hostname: api-gateway
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
