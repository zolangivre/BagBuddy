services:
  # --- EUREKA SERVER ---
  eureka-server:
    build:
      context: ./eurekaserver
      dockerfile: Dockerfile
    container_name: bagbuddy-eureka-server
    ports:
      - "8761:8761"
    networks:
      - bagbuddy-network

  # --- API GATEWAY ---
  api-gateway:
    build:
      context: ./apigateway
      dockerfile: Dockerfile
    container_name: bagbuddy-api-gateway-dev
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server   # ✅ attend que Eureka soit lancé avant de démarrer
    restart: unless-stopped
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/  # pour s’assurer que la variable est disponible
    networks:
      - bagbuddy-network

  # --- TRIP SERVICE ---
  trip-service:
    build:
      context: ./tripservice
      dockerfile: Dockerfile
    container_name: bagbuddy-trip-service-dev
    env_file:
      - ./.env
    ports:
      - "8082:8082"
    depends_on:
      - eureka-server
      - tripservice-db
    networks:
      - bagbuddy-network

  tripservice-db:
    image: postgres:15-alpine
    container_name: bagbuddy-trip-service-postgres
    environment:
      POSTGRES_DB: ${TRIP_SERVICE_DB}
      POSTGRES_USER: ${TRIP_SERVICE_USER}
      POSTGRES_PASSWORD: ${TRIP_SERVICE_PASSWORD}
    volumes:
      - trip_pgdata:/var/lib/postgresql/data
    ports:
      - ${TRIP_SERVICE_DB_PORT}:5432
    networks:
      - bagbuddy-network

  # --- KEYCLOAK ---
  keycloak:
    image: quay.io/keycloak/keycloak:25.0.0
    container_name: bagbuddy-keycloak
    command: start-dev
    environment:
      KC_PROXY: edge
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8000:8080"
    depends_on:
      - keycloak-db
    networks:
      - bagbuddy-network

  keycloak-db:
    image: postgres:15-alpine
    container_name: bagbuddy-keycloak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak_pgdata:/var/lib/postgresql/data
    ports:
      - 5435:5432   # ✅ éviter le conflit avec les autres Postgres
    networks:
      - bagbuddy-network

  # --- TRANSACTION SERVICE ---
  transaction-service:
    build:
      context: ./transactionservice
      dockerfile: Dockerfile
    container_name: bagbuddy-transaction-service-dev
    env_file:
      - ./.env
    ports:
      - "8083:8083"
    depends_on:
      - eureka-server
      - transactionservice-db
    networks:
      - bagbuddy-network

  transactionservice-db:
    image: postgres:15-alpine
    container_name: bagbuddy-transaction-service-postgres
    environment:
      POSTGRES_DB: ${TRANSACTION_SERVICE_DB}
      POSTGRES_USER: ${TRANSACTION_SERVICE_USER}
      POSTGRES_PASSWORD: ${TRANSACTION_SERVICE_PASSWORD}
    volumes:
      - transaction_pgdata:/var/lib/postgresql/data
    ports:
      - ${TRANSACTION_SERVICE_DB_PORT}:5432
    networks:
      - bagbuddy-network

  # --- REVIEW SERVICE ---
  review-service:
    build:
      context: ./reviewservice
      dockerfile: Dockerfile
    container_name: bagbuddy-review-service-dev
    env_file:
      - ./.env
    ports:
      - "8084:8084"
    depends_on:
      - eureka-server
      - reviewservice-db
    networks:
      - bagbuddy-network

  reviewservice-db:
    image: postgres:15-alpine
    container_name: bagbuddy-review-service-postgres
    environment:
      POSTGRES_DB: ${REVIEW_SERVICE_DB}
      POSTGRES_USER: ${REVIEW_SERVICE_USER}
      POSTGRES_PASSWORD: ${REVIEW_SERVICE_PASSWORD}
    volumes:
      - review_pgdata:/var/lib/postgresql/data
    ports:
      - ${REVIEW_SERVICE_DB_PORT}:5432
    networks:
      - bagbuddy-network

# --- VOLUMES & NETWORK ---
volumes:
  messaging_pgdata:
  transaction_pgdata:
  keycloak_pgdata:
  review_pgdata:
  trip_pgdata:

networks:
  bagbuddy-network:
    driver: bridge
