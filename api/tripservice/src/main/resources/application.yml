spring:
  application:
    name: trip-service

  datasource:
    url: jdbc:postgresql://${TRIP_SERVICE_DB_HOST:bagbuddy-trip-service-postgres}:5434/${TRIP_SERVICE_DB:tripservice}
    username: ${TRIP_SERVICE_USER:tripuser}
    password: ${TRIP_SERVICE_PASSWORD:trippass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8082

eureka:
  instance:
    hostname: trip-service
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

logging:
  level:
    org.hibernate.SQL: debug
    org.springframework: info
