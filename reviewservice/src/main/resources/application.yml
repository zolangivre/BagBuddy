spring:
  application:
    name: review-service

  datasource:
    url: jdbc:postgresql://${REVIEW_SERVICE_DB_HOST:reviewservice-db}:5432/${REVIEW_SERVICE_DB:reviewservice}
    username: ${REVIEW_SERVICE_USER:reviewuser}
    password: ${REVIEW_SERVICE_PASSWORD:reviewpass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8082

eureka:
  instance:
    hostname: review-service
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

logging:
  level:
    org.hibernate.SQL: debug
    org.springframework: info
