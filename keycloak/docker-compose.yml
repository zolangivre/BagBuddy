version: '3.9'
services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    restart: unless-stopped
    ports:
      - "8080:8080"      # Expose le port HTTP de Keycloak
    environment:
      KC_HOSTNAME: localhost
      KC_BOOTSTRAP_ADMIN_USERNAME: admin   # utilisateur admin (exemple)
      KC_BOOTSTRAP_ADMIN_PASSWORD: password  # mot de passe admin (exemple)
      KC_HTTP_ENABLED: "true"             # active l’écoute HTTP (8080):contentReference[oaicite:0]{index=0}
      KC_PROXY: edge                      # mode proxy “edge” (derrière reverse proxy):contentReference[oaicite:1]{index=1}
      KC_HOSTNAME_STRICT: "false"         # pas d’hôte strict (valeur par défaut en dev):contentReference[oaicite:2]{index=2}
      KC_HOSTNAME_STRICT_HTTPS: "false"   # pas d’exigence HTTPS (mode edge):contentReference[oaicite:3]{index=3}
    command:
      - start-dev   # démarre Keycloak en mode développement (HTTP sans HTTPS):contentReference[oaicite:4]{index=4}
