spring:
  application:
    name: transaction-service

  datasource:
    url: ${JDBC_DATABASE_URL:${DATABASE_URL}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8082}

eureka:
  instance:
    hostname: transactionservice-app-8f23a0c4e4b5.herokuapp.com
    prefer-ip-address: false
    non-secure-port: 80
    non-secure-port-enabled: true
    secure-port-enabled: false
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: https://eurekaserver-app-dd87242b5252.herokuapp.com/eureka/

logging:
  level:
    org.hibernate.SQL: debug
    org.springframework: info
